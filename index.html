<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inmobiliaria Premium Bolivia</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins,sans-serif;background:#f5f7fa}
.navbar{background:#0f172a}
.hero{min-height:90vh;background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),url('https://images.unsplash.com/photo-1560518883-ce09059eeffa?auto=format&fit=crop&w=1600&q=80') center/cover;color:#fff;display:flex;align-items:center}
.card-property{transition:.4s;border:none;border-radius:18px;overflow:hidden;cursor:pointer}
.card-property:hover{transform:translateY(-10px)}
.card-selected{border:4px solid #0d6efd!important}
.property-img{height:220px;object-fit:cover}
.summary{position:sticky;top:90px}
.footer{background:#0f172a;color:white}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
<div class="container">
<a class="navbar-brand fw-bold" href="#">🏠 Inmobiliaria Premium</a>
</div>
</nav>

<section class="hero">
<div class="container text-center">
<h1 class="display-3 fw-bold">Casas, Terrenos y Departamentos</h1>
<p class="lead">Solicita información de propiedades verificadas</p>
<a href="#catalogo" class="btn btn-primary btn-lg">Ver Propiedades</a>
</div>
</section>

<section id="catalogo" class="container py-5">
<h2 class="text-center mb-5">Catálogo de Propiedades</h2>

<div class="row">
<div class="col-lg-8">
<div class="row g-4" id="cards"></div>
</div>

<div class="col-lg-4">
<div class="card shadow summary">
<div class="card-body">
<h4>Resumen</h4>
<hr>
<p><strong>Solicitud:</strong><br><span id="solicitud">Ninguna</span></p>
<p><strong>Cantidad:</strong> <span id="cantidad">0</span></p>
<p><strong>Total:</strong> Bs. <span id="total">0</span></p>

<form id="formSolicitud">
<div class="mb-3">
<label>Nombre Completo</label>
<input class="form-control" name="nombre" required>
</div>

<div class="mb-3">
<label>Celular</label>
<input class="form-control" name="celular" required>
</div>

<div class="mb-3">
<label>Correo</label>
<input type="email" class="form-control" name="correo" required>
</div>

<div class="mb-3">
<label>Solicitud</label>
<input id="solicitudInput" class="form-control" readonly>
</div>

<button class="btn btn-success w-100">
Generar Solicitud
</button>
</form>

</div>
</div>
</div>
</div>
</section>

<div class="modal fade" id="modalRespuesta" tabindex="-1">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content">
<div class="modal-header bg-success text-white">
<h5 class="modal-title">Solicitud Registrada</h5>
</div>
<div class="modal-body" id="modalBody"></div>
</div>
</div>
</div>

<footer class="footer text-center py-4">
© 2026 Inmobiliaria Premium Bolivia
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    
const propiedades = [

["C1","Casa Achumani","assets/img/c1.jpg"],
["C2","Casa Los Pinos","assets/img/c2.jpg"],
["C3","Casa Irpavi","assets/img/c3.jpg"],
["C4","Casa Obrajes","assets/img/c4.jpg"],
["C5","Casa Calacoto","assets/img/c5.jpg"],

["D1","Departamento Sopocachi","assets/img/d1.jpg"],
["D2","Departamento Miraflores","assets/img/d2.jpg"],
["D3","Departamento San Miguel","assets/img/d3.jpg"],
["D4","Departamento Calacoto","assets/img/d4.jpg"],
["D5","Departamento Seguencoma","assets/img/d5.jpg"],

["T1","Terreno Mecapaca","assets/img/t1.jpg"],
["T2","Terreno Mallasa","assets/img/t2.jpg"],
["T3","Terreno El Alto","assets/img/t3.jpg"],
["T4","Terreno Luribay","assets/img/t4.jpg"],
["T5","Terreno Viacha","assets/img/t5.jpg"]

];

const cards=document.getElementById("cards");

propiedades.forEach(p => {

cards.innerHTML += `

<div class="col-md-6">

    <div class="card card-property h-100" data-code="${p[0]}">

        <img
            class="property-img"
            src="${p[2]}"
            alt="${p[1]}"
        >

        <div class="card-body">

            <h5>${p[1]}</h5>

            <p><strong>Código:</strong> ${p[0]}</p>

            <p class="text-muted">Información disponible bajo solicitud</p>

        </div>

    </div>

</div>

`;

});

const COSTO_CONSULTA = 20;
let seleccionadas = [];
    
document.addEventListener("click",e=>{
const card=e.target.closest(".card-property");
if(!card)return;

const code=card.dataset.code;

if(seleccionadas.includes(code)){
seleccionadas=seleccionadas.filter(x=>x!==code);
card.classList.remove("card-selected");
}else{
seleccionadas.push(code);
card.classList.add("card-selected");
}
actualizar();
});

function actualizar(){
document.getElementById("solicitud").textContent=seleccionadas.join(", ");
document.getElementById("solicitudInput").value=seleccionadas.join(",");
document.getElementById("cantidad").textContent=seleccionadas.length;
document.getElementById("total").textContent = seleccionadas.length * COSTO_CONSULTA;
}

const modal=new bootstrap.Modal(document.getElementById("modalRespuesta"));

const URL_APPS_SCRIPT =
"https://script.google.com/macros/s/AKfycby4afm-ostVZogSecyPtr_ZLCDxRt0zWMbZepHkf74VFaI3VGrJLf_cMEVo3lFR5lR1/exec";

document.getElementById("formSolicitud")
.addEventListener("submit", async (e) => {

e.preventDefault();

if(seleccionadas.length === 0){
    alert("Seleccione al menos una propiedad");
    return;
}
const btn = e.target.querySelector("button");
btn.disabled = true;
btn.innerText = "Enviando...";
    
const formData = new FormData(e.target);

const payload = {
    nombre: formData.get("nombre"),
    celular: formData.get("celular"),
    correo: formData.get("correo"),
    solicitud: seleccionadas.join(",")
        };
    if(!/^[67]\d{7}$/.test(payload.celular)){
    alert("Ingrese un celular válido.");
    return;
};

console.log(payload);

try {

    const response = await fetch(URL_APPS_SCRIPT,{
    method:"POST",
    body: JSON.stringify(payload)
});

    const texto = await response.text();

    console.log("Respuesta Apps Script:");
    console.log(texto);

    const result = JSON.parse(texto);

    document.getElementById("modalBody").innerHTML = `
        <p><strong>Solicitud:</strong> ${result.solicitud}</p>
        <p><strong>Monto:</strong> Bs.${result.monto}</p>

        <a href="${result.whatsappUrl}"
           target="_blank"
           class="btn btn-success">
           Abrir WhatsApp
        </a>
    `;

    modal.show();
    
    btn.disabled = false;
    btn.innerText = "Generar Solicitud";

} catch(error){

    console.error(error);

    console.error(error);

    btn.disabled = false;
    btn.innerText = "Generar Solicitud";

    alert(
        "Error al enviar.\n\nAbre F12 > Consola y dime qué error aparece."
    );

}

});
</script>
</body>
</html>
